# Red Team Operation Logger - Extraction Config
# Format: <tool> [positional] [noextract] [target:<flags>] [cred:<flag>=<role>,...]
# Bare tool name = known tool with URL/global extraction only

# Reconnaissance - positional target tools
nmap positional
enum4linux positional cred:-u=user,-p=pass
enum4linux-ng positional cred:-u=user,-p=pass,-H=hash

# Network / SMB - positional target tools
nxc positional cred:-u=user,-p=pass,-H=hash
crackmapexec positional cred:-u=user,-p=pass,-H=hash
smbmap positional cred:-u=user,-p=pass
ssh positional cred:-l=user
rdesktop positional cred:-u=user,-p=pass
plink positional cred:-l=user,-pw=pass

# Web - flag-based target tools
gobuster target:-u cred:-U=user,-P=pass
ffuf target:-u
feroxbuster target:-u
wfuzz target:-u
sqlmap target:-u
nikto target:-h

# Web - URL-scheme-only tools
curl
wget

# Exploitation
evil-winrm target:-i cred:-u=user,-p=pass,-H=hash
hydra
msfconsole
msfvenom

# Remote Access / File Transfer
scp positional cred:-l=user
sftp positional cred:-l=user
xfreerdp positional cred:/u:=user,/p:=pass
telnet positional
ftp positional cred:-u=user
winexe positional cred:-U=user

# SMB / RPC
smbclient cred:-U=user
rpcclient cred:-U=user

# Network Utilities
nc positional
ncat positional
socat
ldapsearch target:-H cred:-D=user,-w=pass
snmpwalk positional
dig positional

# Utility (no extraction)
searchsploit
responder
chisel
sshuttle

# Active Directory - cred flags only
bloodhound cred:-u=user,-p=pass
kerbrute
certipy
bloodyAD cred:-u=user,-p=pass
rusthound cred:-u=user,-p=pass,--ldapusername=user,--ldappassword=pass
ldapdomaindump cred:-u=user,-p=pass
ldeep cred:-u=user,-p=pass,-H=hash
windapsearch cred:-u=user,-p=pass
adidnsdump cred:-u=user,-p=pass
