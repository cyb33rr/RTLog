name: Release

on:
  push:
    tags:
      - "v[0-9]*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Test
        run: make test

      - name: Build
        run: make release

      - name: Create draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >
          gh release create "${{ github.ref_name }}"
          rtlog-linux-amd64
          rtlog-linux-arm64
          rtlog-darwin-amd64
          rtlog-darwin-arm64
          --draft
          --generate-notes
          --verify-tag
